<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="6.5" fill="#075E54"/>
  <!-- White bubble circle -->
  <circle cx="16" cy="15" r="10.5" fill="white"/>
  <!-- Bubble tail -->
  <polygon points="15.5,23.5 9.5,27.5 16.5,21.5" fill="white"/>
  <!-- Green fill -->
